name: Sync Etsy Products

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch products from Etsy
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
        run: node fetch-etsy.js

      - name: Commit updated products.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync products from Etsy"
          file_pattern: products.json
          commit_user_name: "Etsy Sync Bot"
          commit_user_email: "bot@github-actions.local"
