name: Sync Etsy Products

on:
  schedule:
    # Runs every 6 hours — adjusts automatically when you update Etsy/Printify
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Lets you trigger a manual sync from the GitHub Actions tab anytime

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit products.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch products from Etsy
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_SHOP_NAME: ${{ secrets.ETSY_SHOP_NAME }}
        run: node fetch-etsy.js

      - name: Commit updated products.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-sync products from Etsy"
          file_pattern: products.json
          commit_user_name: "Etsy Sync Bot"
          commit_user_email: "bot@github-actions.local"
